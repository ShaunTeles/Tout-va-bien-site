<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tout va bien — Speciality Coffee & Tea Room in Prague</title>

  <!-- Fonts loaded via @font-face in style.css -->

  <link rel="stylesheet" href="style.css" />
  <script src="content.js"></script>
</head>
<body>

  <!-- ═══════════════════════════════════════════
       STICKY NAV
  ═══════════════════════════════════════════ -->
  <nav id="nav">
    <a href="#" class="nav-logo" id="navLogo" aria-label="Tout va bien home">
      <img id="logoImg" src="" alt="" />
    </a>
    <ul class="nav-links" id="navLinks"></ul>
  </nav>

  <!-- ═══════════════════════════════════════════
       HORIZONTAL SCROLL CONTAINER
  ═══════════════════════════════════════════ -->
  <main class="scroll-container" id="scrollContainer">
    <div class="canvas">

      <!-- ── PANEL 1: HERO ── -->
      <section class="panel panel--hero" id="panel-hero">
        <div class="hero-text">
          <h1 class="hero-heading" id="heroHeading"></h1>
          <div class="hero-whats-new">
            <h3 class="sub-head" id="heroWhatsNewTitle"></h3>
            <p class="body-text" id="heroWhatsNewBody"></p>
          </div>
        </div>

        <!-- Social icons — bottom right of hero panel -->
        <div class="social-icons">
          <a class="social-btn" id="instagramLink" href="#" target="_blank" rel="noopener" aria-label="Instagram">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
              <rect x="2" y="2" width="20" height="20" rx="5" ry="5"/>
              <circle cx="12" cy="12" r="4"/>
              <circle cx="17.5" cy="6.5" r="0.5" fill="currentColor" stroke="none"/>
            </svg>
          </a>
          <a class="social-btn" id="facebookLink" href="#" target="_blank" rel="noopener" aria-label="Facebook">
            <svg viewBox="0 0 24 24" fill="currentColor">
              <path d="M18 2h-3a5 5 0 0 0-5 5v3H7v4h3v8h4v-8h3l1-4h-4V7a1 1 0 0 1 1-1h3z"/>
            </svg>
          </a>
        </div>
      </section>

      <!-- ── PANEL 2: MENU ── -->
      <section class="panel panel--menu" id="panel-menu">

        <!-- Large "Coffee" display word -->
        <div class="menu-large-word" id="menuLargeWord"></div>

        <!-- Coffee column -->
        <div class="menu-col menu-col--coffee">
          <h2 class="menu-heading" id="coffeeHeading"></h2>
          <ul class="menu-list" id="coffeeList"></ul>
          <div class="menu-subgroup">
            <p class="menu-label-bold" id="coffeeOfTheDayLabel"></p>
            <p class="body-text" id="coffeeOfTheDay"></p>
          </div>
        </div>

        <!-- Tea column -->
        <div class="menu-col menu-col--tea">
          <h2 class="menu-heading" id="teaHeading"></h2>
          <div class="menu-subgroup">
            <p class="menu-label-bold" id="specialtyTeasLabel"></p>
            <ul class="menu-list" id="specialtyTeasList"></ul>
          </div>
          <div class="menu-subgroup">
            <p class="menu-label-bold" id="otherTeasLabel"></p>
            <ul class="menu-list" id="otherTeasList"></ul>
          </div>
        </div>

        <!-- JPN Teas column -->
        <div class="menu-col menu-col--jpn">
          <h2 class="menu-heading" id="jpnTeasHeading"></h2>
          <ul class="menu-list" id="jpnTeasList"></ul>
        </div>

        <!-- Drinks column -->
        <div class="menu-col menu-col--drinks">
          <h2 class="menu-heading" id="drinksHeading"></h2>
          <ul class="menu-list" id="drinksList"></ul>
        </div>

        <!-- Coffee pour image — bottom of panel -->
        <div class="menu-coffee-image">
          <img id="coffeeImage" src="" alt="" />
        </div>

      </section>

      <!-- ── PANEL 3: SPECIALTY & DRINKS ── -->
      <section class="panel panel--specialty" id="panel-specialty">

        <!-- Coffee of the day card -->
        <div class="specialty-card">
          <img class="specialty-card__img" id="cotdImage" src="" alt="" />
          <p class="sub-head" id="cotdName"></p>
          <p class="body-text" id="cotdType"></p>
        </div>

        <!-- Bensa block -->
        <div class="bensa-block">
          <p class="sub-head" id="bensaName"></p>
          <p class="body-text" id="bensaType"></p>
        </div>

        <!-- Iced drinks column -->
        <div class="drinks-col drinks-col--iced">
          <h2 class="menu-heading" id="icedDrinksHeading"></h2>
          <ul class="menu-list" id="icedDrinksList"></ul>
        </div>

        <!-- Lemonades column -->
        <div class="drinks-col drinks-col--lemonades">
          <h2 class="menu-heading" id="lemonadesHeading"></h2>
          <ul class="menu-list" id="lemonadesList"></ul>
        </div>

        <!-- Café images -->
        <div class="cafe-image cafe-image--main">
          <img id="cafeImage" src="" alt="" />
        </div>
        <div class="cafe-image cafe-image--secondary">
          <img id="cafeImage2" src="" alt="" />
        </div>

      </section>

      <!-- ── PANEL 4: ABOUT US ── -->
      <section class="panel panel--about" id="panel-about">

        <!-- Rotated "About us" display text -->
        <div class="about-rotated-wrap">
          <h2 class="about-rotated-text" id="aboutHeading"></h2>
        </div>

        <!-- Images grid -->
        <div class="about-images">
          <img class="about-img about-img--1" id="aboutImg1" src="" alt="" />
          <img class="about-img about-img--2" id="aboutImg2" src="" alt="" />
          <img class="about-img about-img--3" id="aboutImg3" src="" alt="" />
        </div>

        <!-- Body text -->
        <div class="about-body">
          <h3 class="sub-head" id="aboutWhatsNewTitle"></h3>
          <p class="body-text" id="aboutWhatsNewBody"></p>
        </div>

      </section>

    </div><!-- /.canvas -->
  </main>

  <!-- ═══════════════════════════════════════════
       SPIN CIRCLE (fixed, bottom-left)
  ═══════════════════════════════════════════ -->
  <div class="spin-circle" id="spinCircle">
    <img id="spinCircleImg" src="" alt="" />
  </div>

  <script src="script.js"></script>
</body>
</html>
